<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Memory Jar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 20px; max-width: 400px; margin: auto; }
        h2 { color: #fde047; margin: 0 0 15px 0; }
        select, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; margin-bottom: 15px; }
        #canvas-container { background: #0f172a; border: 2px dashed #334155; border-radius: 12px; padding: 10px; margin-bottom: 15px; }
        canvas { background: white; width: 100%; aspect-ratio: 1/1; border-radius: 8px; display: block; touch-action: none; }
        button { width: 100%; background: #f59e0b; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-sm { padding: 8px; background: #475569; }
    </style>
</head>
<body>

<div class="card">
    <h2>Admin Panel 🍯</h2>
    <select id="typeSelect" onchange="adjustLayout()">
        <option value="text">Message (Text)</option>
        <option value="doodle">Doodle Canvas</option>
    </select>

    <div id="textInput"><textarea id="msg" rows="4"></textarea></div>

    <div id="doodleInput" style="display:none;">
        <div id="canvas-container">
            <canvas id="c"></canvas>
        </div>
        <button class="btn-sm" onclick="clearCanvas()">Clear Canvas</button>
    </div>

    <button onclick="save()">Drop into Jar ✨</button>
</div>

<script>
    const _sb = supabase.createClient("https://kucwhpkcpfadsdrqvxjv.supabase.co", "YOUR_ANON_KEY");
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let drawing = false;

    window.onload = () => { c.width = c.clientWidth; c.height = c.clientHeight; };

    function adjustLayout() {
        const isDoodle = document.getElementById("typeSelect").value === "doodle";
        document.getElementById("textInput").style.display = isDoodle ? "none" : "block";
        document.getElementById("doodleInput").style.display = isDoodle ? "block" : "none";
    }

    c.onpointerdown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
    c.onpointermove = (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
    c.onpointerup = () => drawing = false;

    function clearCanvas() { ctx.clearRect(0, 0, c.width, c.height); }

    async function save() {
        const type = document.getElementById("typeSelect").value;
        const content = type === 'doodle' ? c.toDataURL() : document.getElementById("msg").value;
        await _sb.from('scrapbook').insert([{ type, content }]);
        alert("Saved!");
    }
</script>
</body>
</html>

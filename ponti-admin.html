<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel - Memory Jar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding: 20px 10px;
}
.container {
  max-width: 420px;
  margin: auto;
}
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
  margin-bottom: 20px;
}
h2 {
  margin: 0 0 6px 0;
  color: #fde047;
  font-size: 22px;
}
p.subtitle {
  margin: 0 0 20px 0;
  color: #94a3b8;
  font-size: 14px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: bold;
  color: #cbd5e1;
}
select, textarea, input[type="text"] {
  width: 100%;
  padding: 12px;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 8px;
  color: white;
  margin-bottom: 20px;
  font-size: 15px;
  box-sizing: border-box;
}
select:focus, textarea:focus, input[type="text"]:focus {
  outline: none;
  border-color: #f59e0b;
}

/* CANVAS DRAWING TOOL STYLES */
.canvas-container {
  background: #0f172a;
  border: 2px dashed #334155;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
canvas {
  background: white;
  border-radius: 8px;
  cursor: crosshair;
  touch-action: none; /* Prevents mobile screen scrolling while drawing */
}
.canvas-controls {
  display: flex;
  gap: 10px;
  width: 100%;
  margin-top: 10px;
}
.color-swatch {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
}
.color-swatch.active {
  border-color: white;
  transform: scale(1.1);
}

button {
  width: 100%;
  background: #f59e0b;
  color: #0f172a;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
button:active {
  transform: scale(0.99);
}
.btn-secondary {
  background: #475569;
  color: white;
  padding: 10px;
  font-size: 14px;
}

#status-message {
  text-align: center;
  font-size: 14px;
  margin-top: 14px;
  font-weight: bold;
  display: none;
}
.success { color: #10b981; }
.error { color: #ef4444; }

.nav-link {
  display: block;
  text-align: center;
  color: #94a3b8;
  text-decoration: none;
  font-size: 14px;
  margin-top: 10px;
}
.nav-link:hover { color: #f59e0b; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>Memory Jar Admin 🍯</h2>
    <p class="subtitle">Drop a new note, voice link, or draw a fresh doodle</p>
    
    <form id="memory-form" onsubmit="saveMemory(event)">
      <label for="type">Select Folder Category</label>
      <select id="type" onchange="adjustFormLayout()">
        <option value="text">💬 Message (Text Note)</option>
        <option value="voice">🎤 Voice Note (Audio URL)</option>
        <option value="doodle">🎨 Doodle Canvas (Draw Here)</option>
      </select>
      
      <div id="standard-input-group">
        <label id="content-label" for="content">Memory Content</label>
        <textarea id="content" rows="5" placeholder="Type your sweet note here..."></textarea>
      </div>

      <div id="canvas-input-group" class="canvas-container" style="display: none;">
        <label style="align-self: flex-start;">Draw Your Doodle Below:</label>
        <canvas id="doodleCanvas" width="320" height="320"></canvas>
        
        <div class="canvas-controls">
          <div class="color-swatch active" style="background: #ef4444;" onclick="setStrokeColor('#ef4444', this)"></div>
          <div class="color-swatch" style="background: #3b82f6;" onclick="setStrokeColor('#3b82f6', this)"></div>
          <div class="color-swatch" style="background: #10b981;" onclick="setStrokeColor('#10b981', this)"></div>
          <div class="color-swatch" style="background: #000000;" onclick="setStrokeColor('#000000', this)"></div>
          <button type="button" class="btn-secondary" onclick="clearCanvas()" style="margin-left: auto; width: auto;">Clear</button>
        </div>
      </div>
      
      <button type="submit" id="submit-btn">Drop into Jar ✨</button>
    </form>
    
    <div id="status-message"></div>
  </div>
  
  <a href="index.html" class="nav-link">Go to Main View ➡️</a>
</div>

<script>
const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Canvas Reference Elements
let canvas, ctx;
let drawing = false;
let rawColor = "#ef4444"; // Default active color swatch match

window.onload = () => {
  initCanvas();
  adjustFormLayout();
};

function initCanvas() {
  canvas = document.getElementById('doodleCanvas');
  ctx = canvas.getContext('2d');
  
  ctx.strokeStyle = rawColor;
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  // PC Mouse Events
  canvas.onmousedown = (e) => { drawing = true; draw(e); };
  canvas.onmousemove = (e) => draw(e);
  window.onmouseup = () => drawing = false;

  // Mobile Touch Listeners
  canvas.ontouchstart = (e) => { drawing = true; draw(e.touches[0]); };
  canvas.ontouchmove = (e) => { draw(e.touches[0]); e.preventDefault(); };
  window.ontouchend = () => drawing = false;
}

function draw(e) {
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function setStrokeColor(color, element) {
  rawColor = color;
  ctx.strokeStyle = color;
  document.querySelectorAll('.color-swatch').forEach(sw => sw.classList.remove('active'));
  element.classList.add('active');
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
}

function adjustFormLayout() {
  const type = document.getElementById("type").value;
  const standardGroup = document.getElementById("standard-input-group");
  const canvasGroup = document.getElementById("canvas-input-group");
  const contentInput = document.getElementById("content");
  const label = document.getElementById("content-label");
  
  if (type === "doodle") {
    standardGroup.style.display = "none";
    canvasGroup.style.display = "flex";
    contentInput.required = false;
  } else {
    standardGroup.style.display = "block";
    canvasGroup.style.display = "none";
    contentInput.required = true;
    
    if (type === "text") {
      label.innerText = "Memory Content";
      contentInput.placeholder = "Type your sweet note here...";
    } else if (type === "voice") {
      label.innerText = "Audio File Link (URL)";
      contentInput.placeholder = "https://your-storage-site.com/voice-note.mp3";
    }
  }
}

async function saveMemory(event) {
  event.preventDefault();
  
  const type = document.getElementById("type").value;
  const submitBtn = document.getElementById("submit-btn");
  const statusEl = document.getElementById("status-message");
  let dataPayloadContent = "";

  if (type === "doodle") {
    // Check if canvas is empty before saving
    const buffer = document.createElement('canvas');
    buffer.width = canvas.width;
    buffer.height = canvas.height;
    if (canvas.toDataURL() === buffer.toDataURL()) {
      statusEl.className = "error";
      statusEl.innerText = "Please draw something on the canvas first!";
      statusEl.style.display = "block";
      return;
    }
    // Turn the drawing into an exportable base64 image data string
    dataPayloadContent = canvas.toDataURL("image/png");
  } else {
    dataPayloadContent = document.getElementById("content").value.trim();
  }
  
  submitBtn.disabled = true;
  submitBtn.innerText = "Dropping it in...";
  statusEl.style.display = "none";
  
  try {
    const { data, error } = await sb
      .from('scrapbook')
      .insert([{ type: type, content: dataPayloadContent, is_read: false }]);
      
    if (error) throw error;
    
    document.getElementById("content").value = "";
    clearCanvas();
    statusEl.className = "success";
    statusEl.innerText = "Saved safely! The badge counter updated instantly. ❤️";
    statusEl.style.display = "block";
    
  } catch (err) {
    console.error(err);
    statusEl.className = "error";
    statusEl.innerText = "Failed to drop into jar. Check database rule setups.";
    statusEl.style.display = "block";
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerText = "Drop into Jar ✨";
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Jar Admin 🍯</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Memory Jar Admin 🍯</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">Drop a new note, or delete live memories</p>

        <label style="display:block; margin-bottom:8px; font-size: 0.9rem;">Select Folder Category</label>
        <select id="typeSelect" onchange="adjustFormLayout()">
            <option value="text">💬 Message (Text Note)</option>
            <option value="doodle">🎨 Doodle Canvas</option>
        </select>

        <label style="display:block; margin-bottom:8px; font-size: 0.9rem;">Memory Content</label>
        <div id="standard-input"><textarea id="textContent" placeholder="Type your sweet note here..." rows="4"></textarea></div>

        <div id="canvas-container" style="display: none;">
            <div id="canvasBoxBounds" style="width: 100%; touch-action: none;"><canvas id="doodleCanvas"></canvas></div>
            <div class="tools-row">
                <button class="tool-btn active" onclick="setBrush('pen', this)">Pen</button>
                <button class="tool-btn" onclick="setBrush('highlighter', this)">Highlighter</button>
            </div>
            <div class="canvas-controls">
                <div class="color-swatch active" style="background:#000" onclick="setColor('#000', this)"></div>
                <div class="color-swatch" style="background:#ef4444" onclick="setColor('#ef4444', this)"></div>
                <div class="color-swatch" style="background:#3b82f6" onclick="setColor('#3b82f6', this)"></div>
                <div class="color-swatch" style="background:#10b981" onclick="setColor('#10b981', this)"></div>
                <button class="btn-secondary" onclick="clearCanvas()">Clear</button>
            </div>
        </div>

        <button onclick="postMemory()">Drop into Jar ✨</button>
    </div>

    <div class="card">
        <h3>Live Database (Manage Drops)</h3>
        <div id="live-memories" style="margin-top: 15px;"></div>
    </div>
</div>

<script src="Shared.js"></script>
<script>
// Supabase Setup
const _sb = supabase.createClient("https://kucwhpkcpfadsdrqvxjv.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg");

// Initialize Saved EmailJS Credentials
emailjs.init("z7bA6b6Lw7D0V6b8Z");

let canvas, ctx, drawing = false, mode = 'pen', color = '#000', history = [];

window.onload = () => { 
    try { if (typeof BebiEngine !== 'undefined') BebiEngine.boot(); } catch(e) { console.log("Engine boot skipped"); }
    
    canvas = document.getElementById('doodleCanvas'); 
    ctx = canvas.getContext('2d'); 
    
    if (document.getElementById("canvas-container").style.display !== "none") {
        resizeCanvas();
    }
    fetchMemories(); 
};

// FORCE EXPLICIT SIZE FOR MOBILE
function resizeCanvas() { 
    if (!canvas) return;
    const boxWidth = canvas.parentElement.clientWidth;
    if (boxWidth === 0) return;
    
    canvas.width = boxWidth; 
    canvas.height = boxWidth; // Force 1:1 perfect square
    redraw(); 
}

function setBrush(m, el) { mode = m; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
function setColor(c, el) { color = c; document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active')); el.classList.add('active'); }
function clearCanvas() { history = []; redraw(); }

// BULLETPROOF MOBILE TOUCH AND MOUSE LOGIC
function getPointerPos(e) {
    const r = canvas.getBoundingClientRect();
    const evt = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
    return { x: evt.clientX - r.left, y: evt.clientY - r.top };
}

function startDraw(e) {
    if (e.cancelable) e.preventDefault(); 
    drawing = true;
    const pos = getPointerPos(e);
    if (pos) history.push({mode, color, points: [pos]});
}

function doDraw(e) {
    if(!drawing) return;
    if (e.cancelable) e.preventDefault();
    const pos = getPointerPos(e);
    if (pos) {
        history[history.length-1].points.push(pos);
        redraw();
    }
}

function stopDraw() { drawing = false; }

// Bind standard mouse events
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', stopDraw);

// Bind strict mobile touch events
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', doDraw, { passive: false });
canvas.addEventListener('touchend', stopDraw);
canvas.addEventListener('touchcancel', stopDraw);

function redraw() {
    ctx.clearRect(0,0, canvas.width, canvas.height);
    history.forEach(s => {
        ctx.beginPath();
        ctx.strokeStyle = s.mode === 'highlighter' ? s.color.replace('#','rgba(') + ',0.35)' : s.color;
        ctx.lineWidth = s.mode === 'highlighter' ? 26 : 5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        s.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.quadraticCurveTo(s.points[i-1].x, s.points[i-1].y, p.x, p.y));
        ctx.stroke();
    });
}

async function fetchMemories() {
    try {
        document.getElementById('live-memories').innerHTML = "<p style='color: var(--text-dim); text-align: center;'>Loading memories...</p>";
        
        const { data, error } = await _sb.from('scrapbook').select('*').order('created_at', { ascending: false });
        
        if (error) throw error;
        if (!data || data.length === 0) {
            document.getElementById('live-memories').innerHTML = "<p style='color: var(--text-dim); text-align: center;'>No drops in the jar yet.</p>";
            return;
        }

        document.getElementById('live-memories').innerHTML = data.map(m => {
            const safeContent = m.content ? m.content : "";
            const textPreview = safeContent.length > 25 ? safeContent.substring(0, 25) + "..." : safeContent;

            return `
            <div style="background: var(--bg-color); border-radius: 12px; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; position: relative;">
                
                <div style="position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 4px; height: 20px; background: #ef4444; border-radius: 0 4px 4px 0;"></div>
                
                <div style="display: flex; align-items: center; gap: 15px; padding-left: 10px;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: #1a202c; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;">
                        ${m.type === 'doodle' ? '🎨' : '💬'}
                    </div>
                    
                    ${m.type === 'doodle' 
                        ? `<img src="${safeContent}" style="width: 40px; height: 40px; object-fit: cover; background: white; border-radius: 8px; flex-shrink: 0;" alt="doodle">` 
                        : `<span style="color: #fff; font-size: 0.95rem; word-break: break-word;">${textPreview}</span>`
                    }
                </div>
                
                <button class="btn-danger" style="margin-left: auto; width: auto; z-index: 2;" onclick="del(${m.id})">Delete</button>
            </div>`
        }).join('');
    } catch (err) {
        console.error("Database connection failed:", err);
        document.getElementById('live-memories').innerHTML = `<p style="color: #ef4444; text-align: center;">Error loading database: ${err.message}</p>`;
    }
}

async function del(id) { 
    await _sb.from('scrapbook').delete().eq('id', id); 
    fetchMemories(); 
}

async function postMemory() {
    try {
        const type = document.getElementById("typeSelect").value;
        const content = type === "doodle" ? canvas.toDataURL() : document.getElementById("textContent").value;
        
        // Block empty notes from sending
        if (type === "text" && (!content || content.trim() === "")) return; 
        
        // 1. Insert into Supabase
        await _sb.from('scrapbook').insert([{ type, content, is_read: false }]);
        
        // 2. Generate preview message for EmailJS template
        let preview = type === "doodle" ? "🎨 V just dropped a new doodle!" : `💬 New note: "${content.substring(0, 40)}${content.length > 40 ? '...' : ''}"`;
        
        // 3. Send Email Notification via EmailJS
        emailjs.send("service_lnm984s", "template_default", {
            message: preview
        }).then(() => {
            console.log("Email notification sent successfully!");
        }).catch((err) => {
            console.error("EmailJS failed to deliver notification:", err);
        });
        
        // 4. Reset interface elements
        if (type === "text") document.getElementById("textContent").value = "";
        else clearCanvas(); 
        
        fetchMemories();
    } catch (err) {
        console.error("Failed to post:", err);
        alert("Failed to drop memory. Check connection.");
    }
}

function adjustFormLayout() {
    const isD = document.getElementById("typeSelect").value === "doodle";
    document.getElementById("standard-input").style.display = isD ? "none" : "block";
    document.getElementById("canvas-container").style.display = isD ? "flex" : "none";
    
    if (isD) {
        // Redraw after 50ms so the display change has time to register in the browser
        setTimeout(resizeCanvas, 50);
    }
}
</script>
</body>
</html>

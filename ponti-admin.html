<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel - Memory Jar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    /* ... (Keep your existing styles, adding these for full-screen) ... */
    #canvas-container.fullscreen { 
        position: fixed; inset: 0; z-index: 9999; background: #0f172a; padding: 20px; 
        display: flex; flex-direction: column; justify-content: center; 
    }
    #canvas-container.fullscreen #canvasBoxBounds { max-width: 100%; height: 80vh; }
</style>
</head>
<body>
<script>
    // 1. Full Screen Logic
    function toggleFS() {
        const container = document.getElementById('canvas-container');
        container.classList.toggle('fullscreen');
        resizeCanvas();
    }

    // 2. High-Fidelity Drawing Engine (Quadratic Curves)
    function renderStrokePath(stroke) {
        ctx.beginPath();
        ctx.strokeStyle = stroke.mode === 'highlighter' ? stroke.color.replace('#','rgba(') + ',0.35)' : stroke.color;
        ctx.lineWidth = stroke.mode === 'highlighter' ? 26 : 5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        
        for (let i = 0; i < stroke.points.length - 1; i++) {
            const p1 = stroke.points[i];
            const p2 = stroke.points[i+1];
            const xc = (p1.x + p2.x) / 2;
            const yc = (p1.y + p2.y) / 2;
            ctx.quadraticCurveTo(p1.x, p1.y, xc, yc);
        }
        ctx.stroke();
    }

    // 3. Thumbnail Fix (For your Xiaomi)
    function fetchLiveMemories() {
        // ... (Inside the map/loop)
        const preview = mem.type === 'doodle' 
            ? `<img src="${mem.content}" style="width: 40px; height: 40px; object-fit: contain; border-radius: 4px;">` 
            : mem.content;
        // ...
    }
</script>
</body>
</html>

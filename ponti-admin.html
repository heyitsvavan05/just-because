<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox - Bebi's Memory Jar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding: 20px 10px;
}
.container {
  max-width: 420px;
  margin: auto;
}

/* BACK NAVIGATION LINK */
.back-link {
  margin-bottom: 16px;
}
.back-link a {
  color: #94a3b8;
  text-decoration: none;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.back-link a:hover {
  color: #f59e0b;
}

/* FOLDER TABS SYSTEM */
.tab-container {
  display: flex;
  justify-content: space-between;
  background: #1e293b;
  padding: 6px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
}
.tab-btn {
  flex: 1;
  background: transparent;
  color: #94a3b8;
  border: none;
  padding: 12px 0;
  font-size: 13px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active {
  background: #0f172a;
  color: #f59e0b;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}

h3 {
  color: #f8fafc;
  margin-top: 0;
  border-bottom: 2px solid #1e293b;
  padding-bottom: 8px;
  font-size: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.count-tracker {
  font-size: 13px;
  background: #ef4444;
  color: white;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: bold;
}

/* CARDS */
.card {
  display: flex;
  align-items: center;
  padding: 16px;
  background: #1e293b;
  border-radius: 12px;
  margin-bottom: 12px;
  cursor: pointer;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  transition: transform 0.1s;
  position: relative;
}
.card:active { transform: scale(0.98); }

/* Tiny indicator line for cards that are brand new/unread */
.card.unread-card::before {
  content: "";
  position: absolute;
  left: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px;
  height: 24px;
  background: #ef4444;
  border-radius: 4px;
}

.icon {
  width: 44px;
  height: 44px;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
  margin-right: 14px;
  font-size: 20px;
  flex-shrink: 0;
}
.preview-box {
  font-size: 15px;
  color: #cbd5e1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}
.preview-box img {
  max-height: 50px;
  border-radius: 6px;
  background: white;
}
.preview-box audio {
  max-width: 180px;
  height: 28px;
}

/* OVERLAY POPUPS */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.85);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 100;
  backdrop-filter: blur(4px);
}
.modal-content {
  background: #1e293b;
  color: #f8fafc;
  padding: 24px;
  border-radius: 16px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
  box-sizing: border-box;
  text-align: center;
}
#modal-body {
  margin-bottom: 20px;
  font-size: 16px;
  line-height: 1.5;
  color: #e2e8f0;
}
.modal-content button {
  background: #f59e0b;
  color: #0f172a;
  font-weight: bold;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
}
.no-items { text-align: center; color: #64748b; margin-top: 40px; font-size: 15px; }
</style>
</head>
<body>

<div class="container">

  <div class="back-link">
    <a href="index.html">⬅️ Back to Jar</a>
  </div>

  <div class="tab-container">
    <button class="tab-btn" id="tab-text" onclick="switchFolder('text')">💬 Messages</button>
    <button class="tab-btn" id="tab-voice" onclick="switchFolder('voice')">🎤 Voice Notes</button>
    <button class="tab-btn" id="tab-doodle" onclick="switchFolder('doodle')">🎨 Doodles</button>
  </div>

  <h3 id="title-wrapper">
    <span id="title">Loading Folder...</span>
    <span id="header-counter" class="count-tracker" style="display:none;">0</span>
  </h3>
  <div id="list"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div id="modal-body"></div>
    <button onclick="closeModal()">Close Memory</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const urlParams = new URLSearchParams(window.location.search);
let currentFolder = urlParams.get("view") || "text";
let localUnreadCount = parseInt(urlParams.get("unread")) || 0;

window.onload = () => {
  switchFolder(currentFolder); 
};

function updateHeaderCounterDisplay() {
  const counterBadge = document.getElementById("header-counter");
  if (localUnreadCount > 0) {
    counterBadge.innerText = `${localUnreadCount} unread`;
    counterBadge.style.display = "inline-block";
  } else {
    counterBadge.style.display = "none";
  }
}

function switchFolder(folderType) {
  currentFolder = folderType;

  // If she manually switch tabs inside the inbox, clear the injected url counter 
  // so it gracefully fetches fresh data without getting stuck on old values
  if(urlParams.get("view") !== folderType) {
    localUnreadCount = 0; 
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });

  const activeTab = document.getElementById(`tab-${folderType}`);
  if (activeTab) {
    activeTab.classList.add('active');
  }

  const titleEl = document.getElementById("title");
  if (folderType === "text") titleEl.innerText = "Messages";
  if (folderType === "voice") titleEl.innerText = "Voice Notes";
  if (folderType === "doodle") titleEl.innerText = "Doodles";

  updateHeaderCounterDisplay();
  loadMemories();
}

async function loadMemories() {
  const list = document.getElementById("list");
  list.innerHTML = `<p class="no-items" style="color: #f59e0b;">Fetching memories...</p>`;

  const { data, error } = await sb.from("scrapbook")
    .select("*")
    .eq("type", currentFolder)
    .order("created_at", { ascending: false });

  list.innerHTML = "";

  if(error || !data || data.length === 0) {
    list.innerHTML = `<p class="no-items">This folder is empty right now. ✨</p>`;
    localUnreadCount = 0;
    updateHeaderCounterDisplay();
    return;
  }

  // Recount accurate local unread count from payload directly 
  localUnreadCount = data.filter(item => item.is_read === false || item.is_read === null).length;
  updateHeaderCounterDisplay();

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    
    // Add visual flag if unread
    if (item.is_read === false || item.is_read === null) {
      div.classList.add("unread-card");
    }

    let folderIcon = "💌";
    let previewElement = "";

    if (item.type === "text") {
      folderIcon = "💬";
      previewElement = `<span>${item.content.slice(0, 40)}${item.content.length > 40 ? '...' : ''}</span>`;
    } else if (item.type === "voice") {
      folderIcon = "🎤";
      previewElement = `<audio src="${item.content}" controls preload="metadata"></audio>`;
    } else if (item.type === "doodle") {
      folderIcon = "🎨";
      previewElement = `<img src="${item.content}" alt="Doodle Preview"/>`;
    }

    div.innerHTML = `
      <div class="icon">${folderIcon}</div>
      <div class="preview-box">${previewElement}</div>
    `;

    // Pass the unique HTML div instance along so we can modify its styles instantly on click
    div.onclick = () => openMemory(item, div);
    list.appendChild(div);
  });
}

async function openMemory(item, cardElement) {
  const body = document.getElementById("modal-body");

  if (item.type === "doodle") {
    body.innerHTML = `<img src="${item.content}" style="max-width:100%; border-radius:8px; background:white;">`;
  } else if (item.type === "voice") {
    body.innerHTML = `<p style="margin-bottom:10px; font-size:14px; color:#94a3b8;">Voice Note:</p><audio controls src="${item.content}" style="width:100%" autoplay></audio>`;
  } else {
    body.innerText = item.content;
  }

  document.getElementById("modal").style.display = "flex";

  // If unread, process updates
  if (item.is_read === false || item.is_read === null) {
    // 1. Remove the unread visual highlight strip from the card
    cardElement.classList.remove("unread-card");
    
    // 2. Local memory optimization: decrement live counts immediately
    if (localUnreadCount > 0) {
      localUnreadCount--;
      updateHeaderCounterDisplay();
    }
    
    // 3. Prevent loop repeats by mutating local element reference
    item.is_read = true;

    // 4. Update the Supabase Database cluster field natively
    await sb
      .from("scrapbook")
      .update({ is_read: true })
      .eq("id", item.id);
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  const audioEl = document.querySelector('#modal-body audio');
  if(audioEl) {
      audioEl.pause();
      audioEl.currentTime = 0;
  }
}
</script>
</body>
</html>

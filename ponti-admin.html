<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ponti Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    (function() {
        emailjs.init("s8i1NnlReuRH6jqdF"); 
    })();
  </script>

  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
      box-sizing: border-box;
      margin-bottom: 25px;
    }
    h2 { text-align: center; color: #f59e0b; margin-top: 0; margin-bottom: 20px; }
    h3 { color: #f59e0b; margin-top: 5px; margin-bottom: 15px; font-size: 18px; }
    label { font-size: 14px; color: #94a3b8; font-weight: 600; }
    select, textarea, button {
      width: 100%;
      padding: 14px;
      margin: 8px 0 20px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }
    select, textarea { background: #334155; color: white; }
    textarea { height: 120px; resize: none; margin-bottom: 20px; }
    button { background: #f59e0b; color: #0f172a; font-weight: bold; cursor: pointer; margin-bottom: 0; }
    button:active { transform: scale(0.98); }

    /* CORE CANVAS FRAMEWORK ARCHITECTURE */
    #canvas-container {
      display: none;
      flex-direction: column;
      align-items: center;
      background: #0f172a;
      padding: 12px;
      border-radius: 12px;
      margin: 8px 0 20px 0;
      box-sizing: border-box;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* PREMIUM NATIVE FULLSCREEN WORKSPACE OVERLAY */
    #canvas-container.fullscreen-workspace {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      max-width: none !important;
      border-radius: 0;
      z-index: 99999;
      padding: 20px;
      justify-content: space-between;
    }

    .canvas-wrapper-box {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 10px 0;
      min-height: 280px;
    }

    canvas {
      background: white;
      border-radius: 12px;
      touch-action: none;
      cursor: crosshair;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 20px rgba(0,0,0,0.4);
    }

    .brush-tools {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 4px 0 12px 0;
      width: 100%;
    }
    .tool-btn {
      background: #334155;
      color: #94a3b8;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      width: auto;
      margin: 0;
      flex: 1;
      text-align: center;
    }
    .tool-btn.active {
      background: #f59e0b;
      color: #0f172a;
    }

    .canvas-controls-row {
      display: flex;
      width: 100%;
      gap: 10px;
      margin-top: 10px;
    }

    .action-sub-btn {
      background: #475569;
      color: white;
      padding: 10px;
      font-size: 14px;
      border-radius: 8px;
      width: auto;
      flex: 1;
      margin: 0;
    }

    .color-palette-wrapper {
      width: 100%;
      overflow-x: auto;
      padding: 10px 0;
      margin-top: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .color-palette {
      display: flex;
      gap: 12px;
      width: max-content;
      padding: 2px 10px;
    }
    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #334155;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s, border-color 0.1s;
    }
    .color-swatch:active { transform: scale(0.9); }
    .color-swatch.active {
      border-color: #f59e0b;
      transform: scale(1.2);
      box-shadow: 0 0 10px rgba(245, 158, 11, 0.6);
    }

    .voice-btn { background: #ef4444; color: white; font-weight: bold; margin-bottom: 0; }
    .recording { animation: pulse 1.5s infinite; background: #b91c1c; }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    #status-msg { text-align: center; margin-top: 15px; font-size: 14px; color: #cbd5e1; font-weight: bold; }

    .manager-card {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
      box-sizing: border-box;
    }
    .memory-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .memory-item {
      background: #0f172a;
      padding: 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .memory-preview {
      font-size: 14px;
      color: #cbd5e1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
    }
    .memory-preview img {
      max-height: 45px;
      border-radius: 4px;
      background: white;
    }
    .memory-preview audio {
      max-width: 150px;
      height: 30px;
    }
    .delete-btn {
      background: #ef4444;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
      width: auto;
      margin: 0;
      border-radius: 6px;
    }
    .delete-btn:active { background: #b91c1c; }
    .no-memories { text-align: center; color: #64748b; font-size: 14px; padding: 20px 0; }
  </style>
</head>
<body>

<div class="container">
  <h2>Send a Memory</h2>

  <label for="typeSelect">Choose Type:</label>
  <select id="typeSelect" onchange="toggleInputs()">
    <option value="text">Just Because (Text)</option>
    <option value="doodle">Doodle (Draw Now)</option>
    <option value="voice">Voice Note (Record Now)</option>
  </select>

  <div id="text-container" style="display: block;">
    <label for="textContent">Your Message:</label>
    <textarea id="textContent" placeholder="Type your message here..."></textarea>
  </div>

  <div id="canvas-container">
    <label style="margin-bottom: 4px; display: block; width: 100%;">Draw with your finger:</label>

    <div class="brush-tools">
      <button type="button" id="penBtn" class="tool-btn active" onclick="setBrushMode('pen')">✏️ Pen</button>
      <button type="button" id="highlighterBtn" class="tool-btn" onclick="setBrushMode('highlighter')">🖍️ Highlighter</button>
    </div>

    <div class="canvas-wrapper-box" id="canvasBoxBounds">
      <canvas id="doodleCanvas"></canvas>
    </div>

    <div class="color-palette-wrapper">
      <div class="color-palette">
        <div class="color-swatch" style="background: #0f172a;" onclick="changeColor('#0f172a', this)"></div>
        <div class="color-swatch active" style="background: #ef4444;" onclick="changeColor('#ef4444', this)"></div>
        <div class="color-swatch" style="background: #ec4899;" onclick="changeColor('#ec4899', this)"></div>
        <div class="color-swatch" style="background: #f43f5e;" onclick="changeColor('#f43f5e', this)"></div>
        <div class="color-swatch" style="background: #d946ef;" onclick="changeColor('#d946ef', this)"></div>
        <div class="color-swatch" style="background: #a855f7;" onclick="changeColor('#a855f7', this)"></div>
        <div class="color-swatch" style="background: #3b82f6;" onclick="changeColor('#3b82f6', this)"></div>
        <div class="color-swatch" style="background: #0ea5e9;" onclick="changeColor('#0ea5e9', this)"></div>
        <div class="color-swatch" style="background: #06b6d4;" onclick="changeColor('#06b6d4', this)"></div>
        <div class="color-swatch" style="background: #14b8a6;" onclick="changeColor('#14b8a6', this)"></div>
        <div class="color-swatch" style="background: #10b981;" onclick="changeColor('#10b981', this)"></div>
        <div class="color-swatch" style="background: #22c55e;" onclick="changeColor('#22c55e', this)"></div>
        <div class="color-swatch" style="background: #eab308;" onclick="changeColor('#eab308', this)"></div>
        <div class="color-swatch" style="background: #f97316;" onclick="changeColor('#f97316', this)"></div>
      </div>
    </div>

    <div class="canvas-controls-row">
      <button type="button" class="action-sub-btn" onclick="clearCanvas()">🧹 Clear</button>
      <button type="button" class="action-sub-btn" id="toggleWorkspaceBtn" onclick="toggleFullscreenWorkspace()" style="background: #f59e0b; color: #0f172a; font-weight: bold;">🔲 Full Screen</button>
    </div>
  </div>

  <div id="voice-container" style="display: none;">
    <button type="button" id="recordBtn" class="voice-btn" onclick="toggleRecording()">🎤 Start Recording</button>
    <audio id="audioPlayback" controls style="display: none; margin-top: 15px; width: 100%;"></audio>
  </div>

  <button id="submitBtn" onclick="postMemory()">Post Memory</button>

  <p id="status-msg"></p>
</div>

<div class="container manager-card">
  <h3>Manage Saved Memories</h3>
  <div id="memoryListContainer" class="memory-list">
    <p class="no-memories">Loading database...</p>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const EMAILJS_SERVICE_ID = "service_m0nwde2";
  const EMAILJS_TEMPLATE_ID = "template_pl7h7e9";

  window.onload = () => {
    loadMemoriesList();
  };

  function toggleInputs() {
    const type = document.getElementById('typeSelect').value;
    const txtBox = document.getElementById('text-container');
    const cvsBox = document.getElementById('canvas-container');
    const vceBox = document.getElementById('voice-container');

    if (type === 'text') {
      txtBox.style.display = 'block';
      cvsBox.style.display = 'none';
      vceBox.style.display = 'none';
    } else if (type === 'doodle') {
      txtBox.style.display = 'none';
      cvsBox.style.display = 'flex';
      vceBox.style.display = 'none';
      initCanvas();
    } else if (type === 'voice') {
      txtBox.style.display = 'none';
      cvsBox.style.display = 'none';
      vceBox.style.display = 'flex';
    }
  }

  // VELVETY STROKE ENGINE TRACKING DATABASE
  const canvas = document.getElementById('doodleCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let rawColor = "#ef4444"; 
  let brushMode = "pen"; 
  let strokesHistory = [];
  let currentStroke = null;

  function initCanvas() {
    canvas.onmousedown = startDrawing;
    canvas.onmousemove = moveDrawing;
    window.onmouseup = stopDrawing;

    canvas.ontouchstart = startDrawing;
    canvas.ontouchmove = moveDrawing;
    window.ontouchend = stopDrawing;

    setTimeout(resizeCanvasBounds, 60);
  }

  function resizeCanvasBounds() {
    const box = document.getElementById('canvasBoxBounds');
    if (!box) return;
    const rect = box.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);

    redrawCanvasPaths();
  }

  function toggleFullscreenWorkspace() {
    const container = document.getElementById('canvas-container');
    const toggleBtn = document.getElementById('toggleWorkspaceBtn');

    container.classList.toggle('fullscreen-workspace');

    if (container.classList.contains('fullscreen-workspace')) {
      toggleBtn.innerText = "🛑 Exit Fullscreen";
    } else {
      toggleBtn.innerText = "🔲 Full Screen";
    }

    setTimeout(resizeCanvasBounds, 150);
  }

  function getEventCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  }

  function startDrawing(e) {
    drawing = true;
    e.preventDefault();
    const coords = getEventCoords(e);
    currentStroke = {
      mode: brushMode,
      color: rawColor,
      points: [coords]
    };
    redrawCanvasPaths();
  }

  function moveDrawing(e) {
    if (!drawing || !currentStroke) return;
    e.preventDefault();
    const coords = getEventCoords(e);
    currentStroke.points.push(coords);
    redrawCanvasPaths();
  }

  function stopDrawing() {
    if (!drawing) return;
    drawing = false;
    if (currentStroke && currentStroke.points.length > 0) {
      strokesHistory.push(currentStroke);
    }
    currentStroke = null;
    redrawCanvasPaths();
  }

  function redrawCanvasPaths() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    strokesHistory.forEach(renderStrokePath);
    if (currentStroke) {
      renderStrokePath(currentStroke);
    }
  }

  function renderStrokePath(stroke) {
    if (!stroke.points || stroke.points.length === 0) return;

    ctx.beginPath();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    if (stroke.mode === "pen") {
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = 5;
    } else if (stroke.mode === "highlighter") {
      const r = parseInt(stroke.color.slice(1, 3), 16);
      const g = parseInt(stroke.color.slice(3, 5), 16);
      const b = parseInt(stroke.color.slice(5, 7), 16);
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.35)`;
      ctx.lineWidth = 26; 
    }

    if (stroke.points.length < 3) {
      const pt = stroke.points[0];
      ctx.arc(pt.x, pt.y, ctx.lineWidth / 2, 0, Math.PI * 2);
      ctx.fillStyle = ctx.strokeStyle;
      ctx.fill();
      return;
    }

    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
    for (let i = 1; i < stroke.points.length - 1; i++) {
      const xc = (stroke.points[i].x + stroke.points[i + 1].x) / 2;
      const yc = (stroke.points[i].y + stroke.points[i + 1].y) / 2;
      ctx.quadraticCurveTo(stroke.points[i].x, stroke.points[i].y, xc, yc);
    }

    ctx.lineTo(stroke.points[stroke.points.length - 1].x, stroke.points[stroke.points.length - 1].y);
    ctx.stroke();
  }

  function setBrushMode(mode) {
    brushMode = mode;
    document.getElementById('penBtn').classList.toggle('active', mode === 'pen');
    document.getElementById('highlighterBtn').classList.toggle('active', mode === 'highlighter');
  }

  function changeColor(hexColor, element) {
    rawColor = hexColor;
    document.querySelectorAll('.color-swatch').forEach(swatch => swatch.classList.remove('active'));
    element.classList.add('active');
  }

  function clearCanvas() {
    strokesHistory = [];
    currentStroke = null;
    redrawCanvasPaths();
  }

  // CORE AUDIO MEDIA FLOW HANDLERS
  let mediaRecorder;
  let audioChunks = [];
  let audioBase64 = "";
  let isRecording = false;

  async function toggleRecording() {
    const recordBtn = document.getElementById('recordBtn');
    if (!isRecording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true } 
        });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
          const reader = new FileReader();
          reader.readAsDataURL(audioBlob);
          reader.onloadend = () => {
            audioBase64 = reader.result;
            const playback = document.getElementById('audioPlayback');
            playback.src = audioBase64;
            playback.style.display = 'block';
          };
        };
        mediaRecorder.start();
        isRecording = true;
        recordBtn.innerText = "🛑 Stop Recording";
        recordBtn.classList.add('recording');
      } catch (err) {
        alert("Microphone permission denied.");
      }
    } else {
      mediaRecorder.stop();
      isRecording = false;
      recordBtn.innerText = "🎤 Start Recording";
      recordBtn.classList.remove('recording');
    }
  }

  // UPDATED METHOD ATTACHING INTERACTION STATES
  async function postMemory() {
    const type = document.getElementById('typeSelect').value;
    const statusMsg = document.getElementById('status-msg');
    let contentData = "";

    if (type === 'text') contentData = document.getElementById('textContent').value;
    else if (type === 'doodle') contentData = canvas.toDataURL("image/png"); 
    else if (type === 'voice') contentData = audioBase64;

    if (!contentData || contentData.startsWith("data:image/png;base64,iVBOR000KGgoAAAANSUhEUgAAAUAAAAEwCAYAAADV")) {
      statusMsg.innerText = "⚠️ Input cannot be empty!";
      return;
    }

    statusMsg.innerText = "🚀 Sending to her scrapbook...";
    
    // FIX INTEGRATED: We explicitly add "is_read: false" here
    const { data, error } = await _supabase
      .from('scrapbook')
      .insert([{ type: type, content: contentData, is_read: false }]);

    if (error) {
      statusMsg.innerText = "❌ Error: " + error.message;
    } else {
      statusMsg.innerText = "🎉 Saved! Dispatching priority email...";
      triggerAutomatedNotification();

      clearCanvas();
      document.getElementById('textContent').value = "";
      document.getElementById('audioPlayback').style.display = 'none';
      audioBase64 = "";

      document.getElementById('canvas-container').classList.remove('fullscreen-workspace');
      document.getElementById('toggleWorkspaceBtn').innerText = "🔲 Full Screen";

      loadMemoriesList(); 
    }
  }

  async function triggerAutomatedNotification() {
    const templateParams = { name: "Bebi" };
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
      .then((response) => {
         console.log("Delivered successfully!", response.status, response.text);
      }, (err) => {
         console.log("Error:", err);
      });
  }

  async function loadMemoriesList() {
    const container = document.getElementById('memoryListContainer');
    const { data: memories, error } = await _supabase
      .from('scrapbook')
      .select('id, type, content, created_at')
      .order('created_at', { ascending: false });

    if (error) {
      container.innerHTML = `<p class="no-memories" style="color:#ef4444;">Failed to sync rows: ${error.message}</p>`;
      return;
    }
    if (!memories || memories.length === 0) {
      container.innerHTML = `<p class="no-memories">The jar is currently empty. ✨</p>`;
      return;
    }
    container.innerHTML = ""; 

    memories.forEach(item => {
      const itemRow = document.createElement('div');
      itemRow.className = 'memory-item';
      itemRow.id = `mem-row-${item.id}`;

      let previewContent = "";
      if (item.type === 'text') previewContent = `<span>💬 ${item.content}</span>`;
      else if (item.type === 'doodle') previewContent = `<img src="${item.content}" />`;
      else if (item.type === 'voice' || item.type === 'audio') previewContent = `<audio src="${item.content}" controls></audio>`;

      itemRow.innerHTML = `
        <div class="memory-preview">${previewContent}</div>
        <button class="delete-btn" onclick="deleteMemoryRow('${item.id}')">Delete 🗑️</button>
      `;
      container.appendChild(itemRow);
    });
  }

  async function deleteMemoryRow(id) {
    if(!confirm("Are you sure you want to permanently delete this memory?")) return;
    const targetId = parseInt(id, 10);
    const { error } = await _supabase.from('scrapbook').delete().eq('id', targetId);

    if (error) {
      alert("Could not remove row: " + error.message);
    } else {
      const element = document.getElementById(`mem-row-${id}`);
      if(element) element.remove();
    }
  }
</script>
</body>
</html>

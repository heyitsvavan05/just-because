<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;margin:0}
.container{max-width:420px;margin:auto}

.card{
  display:flex;
  padding:15px;
  border-bottom:1px solid #2d3748;
}

.icon{width:40px;height:40px;background:#1f2937;border-radius:50%;
display:flex;align-items:center;justify-content:center;margin-right:10px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center}
.box{background:white;color:black;padding:15px;border-radius:10px;max-width:90%}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">
<h2 id="title">Inbox</h2>
<div id="list"></div>
</div>

<div id="modal" class="modal hidden" onclick="closeModal()">
<div class="box" onclick="event.stopPropagation()">
<div id="modalBody"></div>
</div>
</div>

<script>
const supabase = supabase.createClient(
"https://kucwhpkcpfadsdrqvxjv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg"
);

const type = new URLSearchParams(location.search).get("view");

document.getElementById("title").innerText = type.toUpperCase();

async function load(){
const {data}=await supabase.from("scrapbook").select("*").eq("type",type).order("created_at",{ascending:false});

const list=document.getElementById("list");
list.innerHTML="";

data.forEach(i=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="icon">💌</div>
<div>${i.content.slice(0,40)}</div>
`;

div.onclick=()=>open(i);
list.appendChild(div);
});
}

function open(i){
const m=document.getElementById("modal");
const b=document.getElementById("modalBody");

if(i.type==="doodle") b.innerHTML=`<img src="${i.content}" style="max-width:100%">`;
else if(i.type==="voice") b.innerHTML=`<audio controls src="${i.content}"></audio>`;
else b.innerHTML=`<pre>${i.content}</pre>`;

m.classList.remove("hidden");
}

function closeModal(){
document.getElementById("modal").classList.add("hidden");
}

load();
</script>

</body>
</html>

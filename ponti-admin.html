<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
}

.box {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

textarea, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

canvas {
  background: white;
  width: 100%;
  height: 300px;
  touch-action: none;
}
</style>
</head>

<body>

<div class="box">

<h2>Send Memory</h2>

<select id="type" onchange="toggle()">
  <option value="text">text</option>
  <option value="doodle">doodle</option>
</select>

<textarea id="text"></textarea>

<canvas id="canvas" style="display:none;"></canvas>

<button onclick="clearCanvas()">Clear</button>
<button onclick="post()">Post</button>

<p id="status"></p>

</div>

<script>
const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

canvas.onmousedown = e => { drawing = true; ctx.beginPath(); draw(e); };
canvas.onmouseup = () => drawing = false;
canvas.onmousemove = draw;

function draw(e){
  if(!drawing) return;
  const r = canvas.getBoundingClientRect();
  ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
  ctx.stroke();
  ctx.beginPath();
}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function toggle(){
  canvas.style.display = document.getElementById("type").value === "doodle" ? "block" : "none";
}

async function post(){
  const type = document.getElementById("type").value;
  let content = "";

  if(type === "text") content = document.getElementById("text").value;
  if(type === "doodle") content = canvas.toDataURL();

  const { error } = await supabase
    .from("scrapbook")
    .insert([{ type, content }]);

  document.getElementById("status").innerText =
    error ? error.message : "Saved ✔";
}
</script>

</body>
</html>

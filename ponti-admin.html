<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel - Memory Jar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { margin: 0; background: #0f172a; color: white; font-family: -apple-system, sans-serif; padding: 20px 10px; }
.container { max-width: 420px; margin: auto; }
.card { background: #1e293b; padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); margin-bottom: 20px; }
h2 { margin: 0 0 6px 0; color: #fde047; font-size: 22px; }
.subtitle { margin: 0 0 20px 0; color: #94a3b8; font-size: 14px; }
select, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; margin-bottom: 20px; box-sizing: border-box; }

#canvas-container { background: #0f172a; border: 2px dashed #334155; border-radius: 12px; padding: 10px; margin-bottom: 20px; }
#canvasBoxBounds { width: 100%; max-width: 400px; aspect-ratio: 1/1; position: relative; }
canvas { background: white; border-radius: 8px; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }

.tools-row, .canvas-controls { display: flex; gap: 8px; margin-top: 10px; }
.tool-btn { flex: 1; padding: 8px; background: #334155; color: white; border: 2px solid transparent; border-radius: 8px; cursor: pointer; }
.tool-btn.active { border-color: #fde047; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
.color-swatch.active { border-color: white; }

button { width: 100%; background: #f59e0b; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.btn-danger { background: #ef4444; color: white; padding: 6px 12px; width: auto; font-size: 12px; }

.memory-item { background: #334155; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
.memory-content { display: flex; align-items: center; gap: 10px; overflow: hidden; }
.memory-type { font-size: 11px; font-weight: bold; color: #fde047; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>Memory Jar Admin 🍯</h2>
    <p class="subtitle">Managing live memories</p>
    
    <select id="typeSelect" onchange="adjustFormLayout()">
      <option value="text">Text Note</option>
      <option value="doodle">Doodle Canvas</option>
    </select>
    
    <div id="standard-input-group"><textarea id="textContent" rows="5"></textarea></div>
    <div id="canvas-container" style="display: none;">
      <div id="canvasBoxBounds"><canvas id="doodleCanvas"></canvas></div>
      <div class="tools-row">
        <button class="tool-btn active" onclick="setBrushMode('pen', this)">Pen</button>
        <button class="tool-btn" onclick="setBrushMode('highlighter', this)">Highlighter</button>
      </div>
    </div>
    <button onclick="postMemory()">Drop into Jar ✨</button>
  </div>

  <div class="card">
    <h3>Live Database</h3>
    <div id="live-memories"></div>
  </div>
</div>

<script>
const _supabase = supabase.createClient("https://kucwhpkcpfadsdrqvxjv.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg");
let canvas, ctx, drawing = false, rawColor = "#000000", brushMode = "pen", strokesHistory = [], currentStroke = null;

window.onload = () => { initCanvas(); fetchLiveMemories(); };

function initCanvas() {
  canvas = document.getElementById('doodleCanvas');
  ctx = canvas.getContext('2d');
  canvas.onmousedown = (e) => { drawing = true; currentStroke = { color: rawColor, mode: brushMode, points: [{x: e.offsetX, y: e.offsetY}] }; };
  canvas.onmousemove = (e) => { if(!drawing) return; currentStroke.points.push({x: e.offsetX, y: e.offsetY}); redraw(); };
  window.onmouseup = () => { if(drawing) { drawing = false; strokesHistory.push(currentStroke); currentStroke = null; } };
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  [...strokesHistory, currentStroke].filter(Boolean).forEach(stroke => {
    ctx.lineCap = "round";
    ctx.lineWidth = stroke.mode === "highlighter" ? 26 : 5;
    ctx.strokeStyle = stroke.mode === "highlighter" ? stroke.color.replace(')', ', 0.35)').replace('#', 'rgba(') : stroke.color;
    // Simple drawing logic for clarity
    ctx.beginPath();
    stroke.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
  });
}

async function fetchLiveMemories() {
  const { data } = await _supabase.from('scrapbook').select('*').order('created_at', { ascending: false });
  const list = document.getElementById('live-memories');
  list.innerHTML = '';
  data.forEach(mem => {
    let preview = mem.type === 'doodle' 
      ? `<img src="${mem.content}" style="height: 40px; width: 40px; object-fit: contain; border-radius: 4px; background: white;">` 
      : `<span style="font-size: 13px;">${mem.content.substring(0, 20)}</span>`;
      
    list.innerHTML += `<div class="memory-item"><div class="memory-content"><span class="memory-type">${mem.type}</span>${preview}</div><button class="btn-danger" onclick="deleteMemory(${mem.id})">Delete</button></div>`;
  });
}

async function deleteMemory(id) {
  await _supabase.from('scrapbook').delete().eq('id', id);
  fetchLiveMemories();
}

function adjustFormLayout() {
  const isDoodle = document.getElementById("typeSelect").value === "doodle";
  document.getElementById("standard-input-group").style.display = isDoodle ? "none" : "block";
  document.getElementById("canvas-container").style.display = isDoodle ? "block" : "none";
}

async function postMemory() {
  const type = document.getElementById("typeSelect").value;
  const content = type === "doodle" ? canvas.toDataURL() : document.getElementById("textContent").value;
  await _supabase.from('scrapbook').insert([{ type, content, is_read: false }]);
  fetchLiveMemories();
}
</script>
</body>
</html>

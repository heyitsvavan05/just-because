<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: sans-serif;
}

.container {
  max-width: 420px;
  margin: auto;
}

.card {
  display: flex;
  padding: 16px;
  border-bottom: 1px solid #2d3748;
  cursor: pointer;
}

.icon {
  width: 40px;
  height: 40px;
  background: #1f2937;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
  margin-right: 12px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">
  <h3 id="title" style="padding:10px;"></h3>
  <div id="list"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div id="modal-body"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const type = new URLSearchParams(location.search).get("view") || "text";
document.getElementById("title").innerText = type.toUpperCase();

async function load() {
  const { data } = await sb.from("scrapbook")
    .select("*")
    .eq("type", type)
    .order("created_at", { ascending:false });

  const list = document.getElementById("list");
  list.innerHTML = "";

  data?.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="icon">💌</div>
      <div>${(item.content || "").slice(0, 40)}</div>
    `;

    div.onclick = () => open(item);
    list.appendChild(div);
  });
}

function open(item) {
  const body = document.getElementById("modal-body");

  if (item.type === "doodle") {
    body.innerHTML = `<img src="${item.content}" style="max-width:100%">`;
  } else if (item.type === "voice") {
    body.innerHTML = `<audio controls src="${item.content}" style="width:100%"></audio>`;
  } else {
    body.innerText = item.content;
  }

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

load();
</script>

</body>
</html>

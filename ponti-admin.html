<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="Style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" style="max-width: 420px; margin: auto; padding: 20px;">
  <div class="card">
    <h2>Memory Jar Admin 🍯</h2>
    <select id="typeSelect" onchange="adjustFormLayout()">
      <option value="text">Message (Text)</option>
      <option value="doodle">Doodle Canvas</option>
    </select>
    
    <div id="standard-input"><textarea id="textContent" rows="4" style="width:100%;"></textarea></div>
    
    <div id="canvas-container" style="display: none;">
      <button onclick="toggleFS()">⬜ Full Screen</button>
      <div id="canvasBoxBounds" style="width:100%; aspect-ratio:1/1; position:relative;">
        <canvas id="doodleCanvas"></canvas>
      </div>
      <div class="tools-row">
        <button class="tool-btn active" onclick="setBrush('pen', this)">Pen</button>
        <button class="tool-btn" onclick="setBrush('highlighter', this)">Highlighter</button>
      </div>
      <div class="canvas-controls">
         <div class="color-swatch active" style="background:#000" onclick="setColor('#000', this)"></div>
         <div class="color-swatch" style="background:#ef4444" onclick="setColor('#ef4444', this)"></div>
         <button class="btn-secondary" onclick="clearCanvas()">Clear</button>
      </div>
    </div>
    <button onclick="postMemory()">Drop into Jar ✨</button>
  </div>
</div>

<script src="Shared.js"></script>
<script>
const _sb = supabase.createClient("YOUR_SUPABASE_URL", "YOUR_ANON_KEY");
let canvas, ctx, drawing = false, mode = 'pen', color = '#000', history = [];

window.onload = () => { 
    canvas = document.getElementById('doodleCanvas'); 
    ctx = canvas.getContext('2d'); 
    resizeCanvas(); 
};

function getPos(e) { const rect = canvas.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; }
function resizeCanvas() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; redraw(); }

function toggleFS() {
    const cont = document.getElementById('canvas-container');
    if (!document.fullscreenElement) { cont.requestFullscreen(); cont.classList.add('fullscreen'); } 
    else { document.exitFullscreen(); cont.classList.remove('fullscreen'); }
    setTimeout(resizeCanvas, 300);
}

canvas.onpointerdown = (e) => { drawing = true; history.push({mode, color, points: [getPos(e)]}); };
canvas.onpointermove = (e) => { if(!drawing) return; history[history.length-1].points.push(getPos(e)); redraw(); };
canvas.onpointerup = () => drawing = false;

function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    history.forEach(s => {
        ctx.beginPath();
        ctx.strokeStyle = s.mode === 'highlighter' ? s.color.replace('#','rgba(') + ',0.35)' : s.color;
        ctx.lineWidth = s.mode === 'highlighter' ? 26 : 5;
        ctx.lineCap = "round";
        s.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.quadraticCurveTo(s.points[i-1].x, s.points[i-1].y, p.x, p.y));
        ctx.stroke();
    });
}
function adjustFormLayout() {
    const isD = document.getElementById("typeSelect").value === "doodle";
    document.getElementById("standard-input").style.display = isD ? "none" : "block";
    document.getElementById("canvas-container").style.display = isD ? "block" : "none";
}
</script>
</body>
</html>

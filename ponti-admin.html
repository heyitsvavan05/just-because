<!-- shared system -->
<script src="shared.js"></script>

<script>

if (typeof getEmotionalStatus === "function") {
  document.getElementById("admin-status").innerText = getEmotionalStatus();
}

/* UI toggle */
function toggleInputs() {
  const type = document.getElementById('typeSelect').value;

  document.getElementById('text-container').style.display = type === 'text' ? 'block' : 'none';
  document.getElementById('canvas-container').style.display = type === 'doodle' ? 'block' : 'none';
  document.getElementById('voice-container').style.display = type === 'voice' ? 'block' : 'none';

  if (type === 'doodle') initCanvas();
}

/* CANVAS */
const canvas = document.getElementById("doodleCanvas");
const ctx = canvas.getContext("2d");
let drawing = false;

function initCanvas() {
  canvas.onmousedown = e => { drawing = true; ctx.beginPath(); draw(e); };
  canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
  canvas.onmousemove = draw;
}

function draw(e) {
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function clearCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* VOICE (placeholder ready) */
let audioBase64 = "";

/* POST MEMORY */
async function postMemory() {
  const type = document.getElementById("typeSelect").value;

  let content = "";

  if (type === "text") {
    content = document.getElementById("textContent").value.trim();
  } 
  else if (type === "doodle") {
    content = canvas.toDataURL("image/png");
  } 
  else if (type === "voice") {
    content = audioBase64;
  }

  if (!content) {
    document.getElementById("status-msg").innerText = "Empty!";
    return;
  }

  const { error } = await _supabase
    .from("scrapbook")
    .insert([{ type, content }]);

  if (error) {
    document.getElementById("status-msg").innerText = error.message;
    return;
  }

  document.getElementById("status-msg").innerText = "Saved ✔";

  emailjs.send("service_m0nwde2", "template_pl7h7e9", { name: "Bebi" });

  loadMemoriesList();
}

/* LOAD LIST */
async function loadMemoriesList() {
  const container = document.getElementById("memoryListContainer");

  const { data, error } = await _supabase
    .from("scrapbook")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    container.innerHTML = "<p style='color:red;'>Failed to load</p>";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "<p style='color:#94a3b8;'>No memories yet</p>";
    return;
  }

  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "memory-item";

    div.innerHTML = `
      <span>${item.type}</span>
      <button class="delete-btn" onclick="deleteMemory('${item.id}')">Delete</button>
    `;

    container.appendChild(div);
  });
}

/* DELETE */
async function deleteMemory(id) {
  await _supabase.from("scrapbook").delete().eq("id", id);
  loadMemoriesList();
}

loadMemoriesList();

</script>

</body>

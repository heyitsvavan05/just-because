<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ponti Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="ngl-body">

    <div class="admin-container">
        <h2 style="color: var(--accent-yellow); margin-bottom: 20px;">Send a Memory</h2>
        
        <select id="msg-type" class="admin-input" onchange="toggleInputs()">
            <option value="text">Just Because (Text)</option>
            <option value="voice">Voice Note (Link)</option>
            <option value="drawing">Doodle (Link)</option>
        </select>

        <textarea id="msg-content" class="admin-input" placeholder="What's on your mind?"></textarea>

        <input type="text" id="msg-link" class="admin-input hidden" placeholder="Paste URL here...">

        <button id="send-btn" class="close-btn" style="width:100%; margin-top:20px;" onclick="sendToSupabase()">Post Memory</button>
        
        <p id="status" style="margin-top:20px; font-size:0.9rem; color: var(--text-dim);"></p>
        
        <button onclick="location.href='index.html'" style="background:none; border:none; color:white; margin-top:30px; opacity:0.5;">View Live Site</button>
    </div>

    <style>
        .admin-input {
            width: 100%;
            background: #1f2937;
            border: 1px solid #2d3748;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        textarea { height: 150px; resize: none; }
    </style>

    <script>
        const _supabase = supabase.createClient(
            'https://kucwhpkcpfadsdrqvxjv.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg'
        );

        function toggleInputs() {
            const type = document.getElementById('msg-type').value;
            const textInput = document.getElementById('msg-content');
            const linkInput = document.getElementById('msg-link');
            
            if (type === 'text') {
                textInput.classList.remove('hidden');
                linkInput.classList.add('hidden');
            } else {
                textInput.classList.add('hidden');
                linkInput.classList.remove('hidden');
            }
        }

        async function sendToSupabase() {
            const btn = document.getElementById('send-btn');
            const status = document.getElementById('status');
            const type = document.getElementById('msg-type').value;
            const content = (type === 'text') ? document.getElementById('msg-content').value : document.getElementById('msg-link').value;

            if (!content) {
                alert("Please add some content first!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";
            status.innerText = "Connecting to database...";

            const { error } = await _supabase
                .from('scrapbook')
                .insert([{ type: type, content: content }]);

            if (error) {
                status.innerText = "Error: " + error.message;
                btn.disabled = false;
                btn.innerText = "Post Memory";
            } else {
                status.innerText = "Memory Saved Successfully! ❤️";
                btn.innerText = "Post Another";
                btn.disabled = false;
                document.getElementById('msg-content').value = '';
                document.getElementById('msg-link').value = '';
            }
        }
    </script>
</body>
</html>

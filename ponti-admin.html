<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  max-width: 400px;
  width: 100%;
  background: #1e293b;
  padding: 20px;
  margin-top: 20px;
  border-radius: 12px;
}

textarea, select, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}
canvas {
  background: white;
  width: 100%;
  height: 300px;
}
</style>
</head>

<body>

<div class="container">

<h2>Send Memory</h2>

<select id="typeSelect" onchange="toggle()">
  <option value="text">text</option>
  <option value="doodle">doodle</option>
  <option value="voice">voice</option>
</select>

<textarea id="text"></textarea>

<canvas id="canvas" style="display:none;"></canvas>
<button onclick="clearCanvas()">Clear</button>

<button onclick="post()">Post</button>

<p id="status"></p>

</div>

<script>
const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

canvas.onmousedown = e => { drawing = true; ctx.beginPath(); draw(e); };
canvas.onmouseup = () => drawing = false;
canvas.onmousemove = draw;

function draw(e) {
  if (!drawing) return;
  const r = canvas.getBoundingClientRect();
  ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
  ctx.stroke();
  ctx.beginPath();
}

function clearCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function toggle() {
  document.getElementById("canvas").style.display =
    document.getElementById("typeSelect").value === "doodle"
    ? "block" : "none";
}

async function post() {
  const type = document.getElementById("typeSelect").value;

  let content = "";

  if (type === "text") {
    content = document.getElementById("text").value;
  }

  if (type === "doodle") {
    content = canvas.toDataURL();
  }

  const { error } = await _supabase
    .from("scrapbook")
    .insert([{ type, content }]);

  document.getElementById("status").innerText =
    error ? error.message : "Saved ✔";
}
</script>

</body>
</html>

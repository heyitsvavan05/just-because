<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bebi's Memory Jar</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-color: #0f172a;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.app-screen-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  padding: 30px 20px;
  box-sizing: border-box;
}

.folder-header {
  text-align: center;
  margin-bottom: 35px;
  width: 100%;
}

.folder-header h1 {
  color: #fde047;
  margin-bottom: 10px;
}

.folder-header p {
  color: #94a3b8;
  font-size: 14px;
}

.folder-grid {
  display: flex;
  flex-direction: column;
  gap: 18px;
  width: 100%;
}

.folder-card {
  background: #1e293b;
  padding: 20px 24px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 20px;
  text-decoration: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.folder-card:active {
  transform: scale(0.98);
}

.folder-icon {
  font-size: 28px;
}

.folder-card p {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  color: #f8fafc;
}

#home-status {
  margin-top: 10px;
  font-size: 13px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="app-screen-wrapper">

  <div class="folder-header">
    <h1>Bebi's Memory Jar 🍯</h1>
    <p>Open a folder to see what I left for you...</p>
    <p id="home-status"></p>
  </div>

  <div class="folder-grid">

    <a href="inbox.html?view=text" class="folder-card">
      <div class="folder-icon">💬</div>
      <p>Messages</p>
    </a>

    <a href="inbox.html?view=voice" class="folder-card">
      <div class="folder-icon">🎤</div>
      <p>Voice Notes</p>
    </a>

    <a href="inbox.html?view=doodle" class="folder-card">
      <div class="folder-icon">🎨</div>
      <p>Doodles</p>
    </a>

  </div>

</div>

<script>
const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

<script src="shared.js"></script>

<script>
function updateStatus() {
  const el = document.getElementById("home-status");
  if (typeof getAliveMood === "function") {
    el.innerText = getAliveMood();
  }
}
updateStatus();
setInterval(updateStatus, 60000);
</script>

</body>
</html>

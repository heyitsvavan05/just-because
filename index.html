<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bebi's Memory Jar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: var(--bg-mood, #0f172a);
  transition: background 1.5s ease-in-out;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display: flex;
  justify-content: center;
  color: white;
}

.wrapper {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: var(--card-mood, #1e293b);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 16px;
  text-decoration: none;
  display: flex;
  gap: 16px;
  align-items: center;
  color: white;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  transition: transform 0.1s, box-shadow 0.1s, background 1.5s ease-in-out;
  position: relative;
}

.card:active {
  transform: scale(0.98);
  box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

.icon { 
  font-size: 28px; 
  width: 44px;
  height: 44px;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
  flex-shrink: 0;
}

#home-status {
  font-size: 13px;
  color: var(--text-dim, #94a3b8);
  margin-top: 6px;
  font-style: italic;
}

.unread-badge {
  position: absolute;
  top: -6px;   
  right: -6px; 
  background: #ef4444; 
  color: white;
  font-size: 11px;
  font-weight: bold;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  border-radius: 50px; 
  display: none; 
  justify-content: center;
  align-items: center;
  border: 2px solid var(--card-mood, #1e293b); 
  box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
  box-sizing: border-box;
  z-index: 10;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card" style="flex-direction:column; align-items:flex-start; cursor: default;">
    <h2 style="color: var(--accent-yellow, #fde047); margin:0; font-size: 24px;">Bebi's Memory Jar 🍯</h2>
    <p style="margin:4px 0 0 0; color: var(--text-dim, #94a3b8); font-size: 14px;">Open a folder to see memories</p>
    <p id="home-status">Syncing live counters...</p>

    <p id="whisper-message" style="margin: 10px 0 0 0; color: #f59e0b; font-size: 13px; font-style: italic; border-top: 1px solid #334155; padding-top: 8px; width: 100%;"></p>
  </div>

  <a class="card" href="inbox.html?view=text" id="link-text">
    <div class="icon">💬</div>
    <div>
      <div style="font-weight: bold; font-size: 16px;">Messages</div>
      <div style="font-size: 12px; color: var(--text-dim, #94a3b8); margin-top: 2px;">Just because notes</div>
    </div>
    <div class="unread-badge" id="badge-text">0</div>
  </a>

  <a class="card" href="inbox.html?view=voice" id="link-voice">
    <div class="icon">🎤</div>
    <div>
      <div style="font-weight: bold; font-size: 16px;">Voice Notes</div>
      <div style="font-size: 12px; color: var(--text-dim, #94a3b8); margin-top: 2px;">Audio recordings</div>
    </div>
    <div class="unread-badge" id="badge-voice">0</div>
  </a>

  <a class="card" href="inbox.html?view=doodle" id="link-doodle">
    <div class="icon">🎨</div>
    <div>
      <div style="font-weight: bold; font-size: 16px;">Doodles</div>
      <div style="font-size: 12px; color: var(--text-dim, #94a3b8); margin-top: 2px;">Hand-drawn pictures</div>
    </div>
    <div class="unread-badge" id="badge-doodle">0</div>
  </a>

</div>

<script src="shared.js"></script>

<script>
  const supabaseUrl = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
  
  // FIX: Directly passing parameters to fully validate database write privileges
  const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

  window.addEventListener('DOMContentLoaded', () => {
    fetchUnreadCounts();
  });

  async function fetchUnreadCounts() {
    try {
      const { data, error } = await _supabase
        .from('scrapbook')
        .select('type, is_read');

      if (error) throw error;

      let unreadCounts = { text: 0, voice: 0, doodle: 0 };

      data.forEach(item => {
        if (item.is_read === false || item.is_read === null) {
          if (unreadCounts[item.type] !== undefined) {
            unreadCounts[item.type]++;
          }
        }
      });

      renderBadgeElement("badge-text", unreadCounts.text);
      renderBadgeElement("badge-voice", unreadCounts.voice);
      renderBadgeElement("badge-doodle", unreadCounts.doodle);

      // Attach dynamic counts to URL query strings for header consumption
      document.getElementById('link-text').href = `inbox.html?view=text&unread=${unreadCounts.text}`;
      document.getElementById('link-voice').href = `inbox.html?view=voice&unread=${unreadCounts.voice}`;
      document.getElementById('link-doodle').href = `inbox.html?view=doodle&unread=${unreadCounts.doodle}`;

      document.getElementById('home-status').innerText = "All folders fully synchronized.";
    } catch (err) {
      console.error("Counter database synchronization sync failed:", err);
      document.getElementById('home-status').innerText = "Failed to pull live counts.";
    }
  }

  function renderBadgeElement(elementId, count) {
    const badge = document.getElementById(elementId);
    if (count > 0) {
      badge.innerText = count;
      badge.style.display = "flex";
    } else {
      badge.style.display = "none";
    }
  }
</script>
</body>
</html>

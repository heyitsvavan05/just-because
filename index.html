<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bebi's Memory Jar</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* FIXES THE SQUEEZED LAYOUT & CENTER ALIGNS CONTENT VERTICALLY */

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #0f172a;
    }

    .app-screen-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .folder-header {
      text-align: center;
      margin-bottom: 35px;
      width: 100%;
    }

    .folder-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      box-sizing: border-box;
    }

    .folder-card {
      background: #1e293b !important;
      padding: 20px 24px !important;
      border-radius: 16px !important;
      display: flex !important;
      align-items: center !important;
      gap: 20px !important;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3) !important;
      transition: transform 0.1s ease;
      width: 100% !important;
      box-sizing: border-box !important;
    }

    .folder-card:active {
      transform: scale(0.98);
    }

    .folder-icon {
      font-size: 28px !important;
      margin: 0 !important;
    }

    .folder-card p {
      margin: 0 !important;
      font-size: 18px !important;
      font-weight: 600 !important;
      color: #f8fafc !important;
    }
  </style>
</head>

<body>

  <div class="app-screen-wrapper">

    <div class="folder-header">
      <h1>Bebi's Memory Jar 🍯</h1>
      <p style="color: #94a3b8; margin: 8px 0 0 0;">
        Open a folder to see what I left for you...
      </p>

      <!-- OPTIONAL: live emotional status -->
      <p id="home-status" style="color:#94a3b8; font-size:13px; margin-top:8px;"></p>
    </div>

    <div class="folder-grid">

      <a href="inbox.html?view=text" class="folder-card" style="text-decoration: none;">
        <div class="folder-icon">💬</div>
        <p>Messages</p>
      </a>

      <a href="inbox.html?view=voice" class="folder-card" style="text-decoration: none;">
        <div class="folder-icon">🎤</div>
        <p>Voice Notes</p>
      </a>

      <a href="inbox.html?view=doodle" class="folder-card" style="text-decoration: none;">
        <div class="folder-icon">🎨</div>
        <p>Doodles</p>
      </a>

    </div>

  </div>

  <!-- Supabase init -->
  <script>
    const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
    const SUPABASE_KEY = "YOUR_KEY";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  </script>

  <!-- Shared emotional system -->
  <script src="shared.js"></script>

  <!-- Page logic -->
  <script>
    if (typeof getEmotionalStatus === "function") {
      document.getElementById("home-status").innerText = getEmotionalStatus();

      setInterval(() => {
        document.getElementById("home-status").innerText = getEmotionalStatus();
      }, 60000);
    }
  </script>

</body>
</html>

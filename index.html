<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Folders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="ngl-body">
    
    <div class="folder-header">
        <h1>Memory Jar for my Bebi.</h1>
        <p>Random late-night thoughts and sketches. For your eyes only. 🌌</p>
    </div>

    <div class="folder-grid">
        <div class="folder-card" onclick="location.href='inbox.html?type=voice'">
            <div class="folder-icon">📂</div>
            <p>Voice Notes</p>
        </div>
        <div class="folder-card" onclick="location.href='inbox.html?type=drawing'">
            <div class="folder-icon">📂</div>
            <p>Doodles</p>
        </div>
        <div class="folder-card" onclick="location.href='inbox.html?type=text'">
            <div class="folder-icon">📂</div>
            <p>Just Because</p>
        </div>
    </div>
</body>
</html>

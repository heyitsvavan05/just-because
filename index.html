<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Jar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.wrapper {
  max-width: 420px;
  margin: auto;
  padding: 30px 20px;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 18px;
  margin: 12px 0;
  border-radius: 14px;
  text-decoration: none;
  color: white;
  display: flex;
  gap: 12px;
  align-items: center;
}
</style>
</head>

<body>

<div class="wrapper">

  <h2>Bebi’s Memory Jar 🍯</h2>
  <p id="home-status"></p>

  <a class="card" href="inbox.html?view=text">💬 Messages</a>
  <a class="card" href="inbox.html?view=voice">🎤 Voice Notes</a>
  <a class="card" href="inbox.html?view=doodle">🎨 Doodles</a>

</div>

<script src="shared.js"></script>

<script>
document.getElementById("home-status").innerText = getAliveMood();
setInterval(() => {
  document.getElementById("home-status").innerText = getAliveMood();
}, 60000);
</script>

</body>
</html>

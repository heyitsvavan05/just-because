<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bebi's Memory Jar</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* FIXES THE SQUEEZED LAYOUT & CENTER ALIGNS CONTENT VERTICALLY */

<script src="shared.js"></script>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #0f172a; /* Fallback matching your theme */
    }

    /* This wrapper vertically balances everything so it doesn't get crammed at the top */
    .app-screen-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;
      width: 100%;
      max-width: 400px; /* Sweet spot width for phone screens */
      margin: 0 auto;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .folder-header {
      text-align: center;
      margin-bottom: 35px;
      width: 100%;
    }

    /* Fixed folder grid layout that fills width properly without side compression */
    .folder-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Custom padding overrides to make buttons tactile and roomy */
    .folder-card {
      background: #1e293b !important;
      padding: 20px 24px !important;
      border-radius: 16px !important;
      display: flex !important;
      align-items: center !important;
      gap: 20px !important;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3) !important;
      transition: transform 0.1s ease;
      width: 100% !important;
      box-sizing: border-box !important;
    }

    .folder-card:active {
      transform: scale(0.98);
    }

    .folder-icon {
      font-size: 28px !important;
      margin: 0 !important;
    }

    .folder-card p {
      margin: 0 !important;
      font-size: 18px !important;
      font-weight: 600 !important;
      color: #f8fafc !important;
    }
  </style>
</head>
<body>

  <div class="app-screen-wrapper">

      <p style="color: #94a3b8; margin: 8px 0 0 0;">Open a folder to see what I left for you...</p>
    </div>

    <div class="folder-grid">

      <a href="inbox.html?view=text" class="folder-card" style="text-decoration: none;">
        <div class="folder-icon">💬</div>
        <p>Messages</p>
      </a>

      <a href="inbox.html?view=voice" class="folder-card" style="text-decoration: none;">

      </a>

      </a>

    </div>

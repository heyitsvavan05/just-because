<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bebi's Memory Jar</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* FIXES THE SQUISHEED LAYOUT & CENTER ALIGNS CONTENT VERTICALLY */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #0f172a; /* Fallback matching your theme */
    }

    /* This wrapper vertically balances everything so it doesn't get crammed at the top */
    .app-screen-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;
      width: 100%;
      max-width: 400px; /* Sweetsite width for phone screens */
      margin: 0 auto;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .folder-header {
      text-align: center;
      margin-bottom: 35px;
      width: 100%;
    }

    /* Fixed folder grid layout that fills width properly without side compression */
    .folder-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Custom padding overrides to make buttons tactile and roomy */
    .folder-card {
      background: #1e293b !important;
      padding: 20px 24px !important;
      border-radius: 16px !important;
      display: flex !important;
      align-items: center !important;
      gap: 20px !important;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3) !important;
      transition: transform 0.1s ease;
      width: 100% !important;
      box-sizing: border-box !important;
    }
    
    .folder-card:active {
      transform: scale(0.98);
    }

    .folder-icon {
      font-size: 28px !important;
      margin: 0 !important;
    }

    .folder-card p {
      margin: 0 !important;
      font-size: 18px !important;
      font-weight: 600 !important;
      color: #f8fafc !important;
    }

    /* WhatsApp Setup Modal Styles ONLY - Keeps your main style.css clean */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 999; padding: 20px; box-sizing: border-box;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: #1e293b; padding: 24px; border-radius: 16px; width: 100%; max-width: 340px;
      text-align: center; border: 1px solid rgba(245, 158, 11, 0.2);
    }
    .modal-box h4 { margin: 0 0 10px 0; color: #f59e0b; font-size: 18px; }
    .modal-box p { margin: 0 0 20px 0; font-size: 13px; color: #94a3b8; }
    .modal-input {
      width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box;
    }
    .modal-actions { display: flex; gap: 10px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
    .btn-cancel { background: #334155; color: white; }
    .btn-confirm { background: #25D366; color: white; }
  </style>
</head>
<body>

  <div class="app-screen-wrapper">

    <div class="folder-header">
      <h1>Bebi's Memory Jar 🍯</h1>
      <p style="color: #94a3b8; margin: 8px 0 0 0;">Open a folder to see what I left for you...</p>
    </div>

    <div class="folder-grid">

      <a href="inbox.html?view=text" class="folder-card" style="text-decoration: none;">
        <div class="folder-icon">💬</div>
        <p>Messages</p>
      </a>

      <a href="inbox.html?view=voice" class="folder-card" style="text-decoration: none;">
        <div class="folder-icon">🎤</div>
        <p>Voice Notes</p>
      </a>

      <a href="inbox.html?view=doodle" class="folder-card" style="text-decoration: none;">
        <div class="folder-icon">🎨</div>
        <p>Doodles</p>
      </a>

    </div>

    <div class="notification-footer" style="margin-top: 45px; text-align: center; width: 100%;">
      <button onclick="openNotificationModal()" style="background: transparent; color: #94a3b8; border: none; font-size: 13px; cursor: pointer; text-decoration: underline; font-style: italic; display: inline-flex; align-items: center; gap: 6px;">
        📲 <span>Setup System Alerts</span>
      </button>
    </div>

  </div>

  <div id="notificationModal" class="modal-overlay">
    <div class="modal-box">
      <h4>Link WhatsApp Pings</h4>
      <p><strong>Step 1:</strong> Tap below to get your API key.</p>
      <button onclick="getCallMeBotKey()" style="background: #334155; color: #f59e0b; border: 1px solid #f59e0b; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; margin-bottom: 20px; cursor: pointer;">
        Get Activation Key
      </button>
      <p><strong>Step 2:</strong> Enter details below to sync:</p>
      <input type="tel" id="waNumberInput" class="modal-input" placeholder="Number (e.g. 63977539573)">
      <input type="text" id="waApiKeyInput" class="modal-input" placeholder="API Key">
      <div class="modal-actions">
        <button class="modal-btn btn-cancel" onclick="closeNotificationModal()">Cancel</button>
        <button class="modal-btn btn-confirm" onclick="saveNotificationData()">Save Link</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function openNotificationModal() { document.getElementById('notificationModal').classList.add('open'); }
    function closeNotificationModal() { document.getElementById('notificationModal').classList.remove('open'); }

    function getCallMeBotKey() { window.open(`https://api.whatsapp.com/send?phone=34644975353&text=${encodeURIComponent("I allow callmebot to send me messages")}`, '_blank'); }

    async function saveNotificationData() {
      const rawNumber = document.getElementById('waNumberInput').value.trim();
      const apiKey = document.getElementById('waApiKeyInput').value.trim();
      const cleanNumber = rawNumber.replace(/[^0-9]/g, '');

      if (!cleanNumber || !apiKey) { alert("Please fill in both fields!"); return; }

      const updateNum = await _supabase.from('config_settings').update({ value: cleanNumber }).eq('key_name', 'wa_number');
      const updateKey = await _supabase.from('config_settings').update({ value: apiKey }).eq('key_name', 'wa_api_key');

      if (updateNum.error || updateKey.error) { alert("Failed to sync keys."); } 
      else { alert("Linked! Saved configuration live."); closeNotificationModal(); }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bebi's Memory Jar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display: flex;
  justify-content: center;
  color: white;
}

.wrapper {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Enhancements to match the premium dark UI */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 16px;
  text-decoration: none;
  display: flex;
  gap: 16px;
  align-items: center;
  color: white;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  transition: transform 0.1s, box-shadow 0.1s;
}

/* Subtle mobile press feedback */
.card:active {
  transform: scale(0.98);
  box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

.icon { 
  font-size: 28px; 
  width: 44px;
  height: 44px;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
  flex-shrink: 0;
}

#home-status {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 6px;
  font-style: italic;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card" style="flex-direction:column; align-items:flex-start; cursor: default;">
    <h2 style="color:#fde047; margin:0; font-size: 24px;">Bebi's Memory Jar 🍯</h2>
    <p style="margin:4px 0 0 0; color:#94a3b8; font-size: 14px;">Open a folder to see memories</p>
    <p id="home-status">Syncing global heartbeat...</p>
    
    <p id="whisper-message" style="margin: 10px 0 0 0; color: #f59e0b; font-size: 13px; font-style: italic; border-top: 1px solid #334155; padding-top: 8px; width: 100%;"></p>
  </div>

  <a class="card" href="inbox.html?view=text">
    <div class="icon">💬</div>
    <div>
      <div style="font-weight: bold; font-size: 16px;">Messages</div>
      <div style="font-size: 12px; color: #94a3b8; margin-top: 2px;">Just because notes</div>
    </div>
  </a>

  <a class="card" href="inbox.html?view=voice">
    <div class="icon">🎤</div>
    <div>
      <div style="font-weight: bold; font-size: 16px;">Voice Notes</div>
      <div style="font-size: 12px; color: #94a3b8; margin-top: 2px;">Audio recordings</div>
    </div>
  </a>

  <a class="card" href="inbox.html?view=doodle">
    <div class="icon">🎨</div>
    <div>
      <div style="font-weight: bold; font-size: 16px;">Doodles</div>
      <div style="font-size: 12px; color: #94a3b8; margin-top: 2px;">Hand-drawn pictures</div>
    </div>
  </a>

</div>

<script src="shared.js"></script>

</body>
</html>

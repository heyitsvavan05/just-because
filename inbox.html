<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inbox</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: white;
}

.ngl-container {
  max-width: 420px;
  margin: auto;
}

.ngl-header {
  position: sticky;
  top: 0;
  background: #0f172a;
  display: flex;
  justify-content: space-between;
  padding: 1rem;
  border-bottom: 1px solid #2d3748;
}

.ngl-card {
  display: flex;
  padding: 1rem;
  border-bottom: 1px solid #2d3748;
  cursor: pointer;
}

.ngl-mail-icon {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #1f2937;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-right: 12px;
}

.ngl-text-content p {
  margin: 0;
  font-size: 14px;
}

.ngl-text-content span {
  font-size: 11px;
  color: #94a3b8;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 90%;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="ngl-container">

<div class="ngl-header">
  <div onclick="location.href='index.html'">◀</div>

  <div>
    <div id="folder-title">INBOX</div>
    <div id="inbox-status" style="font-size:12px;color:#94a3b8;"></div>
  </div>

</div>

<main id="inbox-list"></main>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div id="modal-body"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- SUPABASE (FIXED + CONSISTENT) -->
<script>
const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
const SUPABASE_KEY = "PASTE_YOUR_ANON_KEY_HERE";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

<!-- SHARED SYSTEM -->
<script src="shared.js"></script>

<script>
const urlParams = new URLSearchParams(location.search);
const folderType = urlParams.get("view") || "text";

document.getElementById("folder-title").innerText =
  folderType.toUpperCase();

// status (alive system safe)
if (typeof getInboxStatus === "function") {
  document.getElementById("inbox-status").innerText = getInboxStatus();
}

async function loadNotes() {

  const { data, error } = await supabaseClient
    .from("scrapbook")
    .select("*")
    .eq("type", folderType)
    .order("created_at", { ascending: false });

  const list = document.getElementById("inbox-list");
  list.innerHTML = "";

  if (error) {
    list.innerHTML = "<p style='text-align:center;color:red'>Failed to load</p>";
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "<p style='text-align:center;color:#94a3b8'>Empty</p>";
    return;
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "ngl-card";

    const preview =
      item.type === "doodle" ? "🎨 Doodle" :
      item.type === "voice" ? "🎤 Voice Note" :
      (item.content || "").slice(0, 40);

    div.innerHTML = `
      <div class="ngl-mail-icon">💌</div>
      <div class="ngl-text-content">
        <p>${preview}</p>
        <span>${new Date(item.created_at).toLocaleDateString()}</span>
      </div>
    `;

    div.onclick = () => openModal(item);
    list.appendChild(div);
  });
}

function openModal(item) {
  const body = document.getElementById("modal-body");

  if (item.type === "doodle") {
    body.innerHTML = `<img src="${item.content}" style="max-width:100%">`;
  } else if (item.type === "voice") {
    body.innerHTML = `<audio controls src="${item.content}" style="width:100%"></audio>`;
  } else {
    body.innerHTML = `<p style="white-space:pre-wrap">${item.content}</p>`;
  }

  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

loadNotes();
</script>

</body>
</html>

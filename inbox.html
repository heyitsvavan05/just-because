<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inbox</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* container */
.ngl-container {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
}

/* header */
.ngl-header {
    position: sticky;
    top: 0;
    background: #0f172a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.2rem;
    border-bottom: 1px solid #2d3748;
}

.ngl-tabs span {
    font-weight: 800;
    color: white;
    border-bottom: 2px solid white;
}

#inbox-status {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 4px;
}

/* cards */
.ngl-card {
    display: flex;
    align-items: center;
    padding: 1rem;
    border-bottom: 1px solid #2d3748;
    color: white;
    cursor: pointer;
}

.ngl-card:active {
    background: #1a202c;
}

.ngl-mail-icon {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #1f2937;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
}

.ngl-text-content {
    flex: 1;
}

.ngl-text-content p {
    margin: 0;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.ngl-text-content span {
    font-size: 11px;
    color: #94a3b8;
}

/* modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 16px;
    max-width: 90%;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="ngl-container">

<header class="ngl-header">
    <div onclick="location.href='index.html'" style="cursor:pointer;">◀</div>

    <div>
        <span id="folder-title">INBOX</span>
        <p id="inbox-status"></p>
    </div>

    <div>⚙️</div>
</header>

<main id="inbox-list"></main>

</div>

<!-- modal -->
<div id="modal" class="modal hidden" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-body"></div>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<!-- Supabase -->
<script>
const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
const SUPABASE_KEY = "YOUR_KEY";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

<!-- shared system -->
<script src="shared.js"></script>

<!-- page logic -->
<script>

const urlParams = new URLSearchParams(window.location.search);
let folderType = urlParams.get('view') || 'text';

const titles = {
    text: "MESSAGES",
    voice: "VOICE NOTES",
    doodle: "DOODLES"
};

document.getElementById("folder-title").innerText = titles[folderType] || "INBOX";

// status (from shared.js)
if (typeof getInboxStatus === "function") {
    document.getElementById("inbox-status").innerText = getInboxStatus();

    setInterval(() => {
        document.getElementById("inbox-status").innerText = getInboxStatus();
    }, 60000);
}

// load notes
async function loadNotes() {
    const { data, error } = await _supabase
        .from('scrapbook')
        .select('*')
        .eq('type', folderType)
        .order('created_at', { ascending: false });

    const list = document.getElementById('inbox-list');
    list.innerHTML = "";

    if (!data || data.length === 0) {
        list.innerHTML = "<p style='color:#94a3b8; text-align:center; padding:30px;'>Nothing here yet...</p>";
        return;
    }

    data.forEach(item => {
        const card = document.createElement('div');
        card.className = "ngl-card";

        let preview = item.content;
        if (item.type === "doodle") preview = "🎨 Doodle";
        if (item.type === "voice") preview = "🎤 Voice Note";

        card.innerHTML = `
            <div class="ngl-mail-icon">💌</div>
            <div class="ngl-text-content">
                <p>${preview.substring(0,40)}</p>
                <span>${new Date(item.created_at).toLocaleDateString()}</span>
            </div>
        `;

        card.onclick = () => openModal(item);
        list.appendChild(card);
    });
}

function openModal(item) {
    const body = document.getElementById("modal-body");

    if (item.type === "doodle") {
        body.innerHTML = `<img src="${item.content}" style="max-width:100%;">`;
    } else if (item.type === "voice") {
        body.innerHTML = `<audio controls src="${item.content}" style="width:100%"></audio>`;
    } else {
        body.innerHTML = `<p style="white-space:pre-wrap;">${item.content}</p>`;
    }

    document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
    document.getElementById("modal").classList.add("hidden");
}

loadNotes();

</script>

</body>
</html>

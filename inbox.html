<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbox</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Fallback safety styles to ensure the popup layout works flawlessly */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
        }
        .hidden { display: none !important; }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .close-btn {
            width: 100%;
            padding: 12px;
            background: #f59e0b;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body class="ngl-body">

    <div class="ngl-container">
        <header class="ngl-header">
            <div onclick="location.href='index.html'" class="back-btn" style="cursor:pointer;">◀</div>
            <div class="ngl-tabs"><span id="folder-title">INBOX</span></div>
            <div class="icon">⚙️</div>
        </header>

        <main id="inbox-list">
            <div class="loading-state">Loading your memories...</div>
        </main>
    </div>

    <div id="modal" class="modal hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        // LIVE DATABASE SYNC
        const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        let folderType = urlParams.get('type') || 'text';
        
        let dbQueryType = folderType;
        if (folderType === 'drawing') {
            dbQueryType = 'doodle'; 
        }

        const titles = { 'voice': 'VOICE NOTES', 'drawing': 'DOODLES', 'text': 'JUST BECAUSE' };
        document.getElementById('folder-title').innerText = titles[folderType] || 'INBOX';

        async function loadNotes() {
            const { data, error } = await _supabase
                .from('scrapbook')
                .select('*')
                .eq('type', dbQueryType) 
                .order('created_at', { ascending: false });

            const list = document.getElementById('inbox-list');
            if(!list) return;
            list.innerHTML = ''; 

            if (error) {
                list.innerHTML = '<p style="text-align:center; padding:20px; color:#ef4444;">Error loading memories.</p>';
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = '<p style="text-align:center; padding:20px; color:#94a3b8;">No memories here yet. 💛</p>';
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'ngl-card';
                
                let previewText = item.content;
                if (item.type === 'doodle') previewText = '🎨 Sent a doodle sketch...';
                if (item.type === 'voice') previewText = '🎤 Sent a voice note...';

                card.innerHTML = `
                    <div class="ngl-mail-icon">❤️</div>
                    <div class="ngl-text-content

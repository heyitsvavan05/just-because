<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbox</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="ngl-body">

    <div class="ngl-container">
        <header class="ngl-header">
            <div onclick="location.href='index.html'" class="back-btn">◀</div>
            <div class="ngl-tabs"><span id="folder-title">INBOX</span></div>
            <div class="icon">⚙️</div>
        </header>

        <main id="inbox-list">
            <div class="loading-state">Loading your memories...</div>
        </main>
    </div>

    <div id="modal" class="modal hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FIXED: Changed parameter key from 'type' to 'view' to match your index.html links
        const urlParams = new URLSearchParams(window.location.search);
        let folderType = urlParams.get('view') || 'text'; 

        // Map the title text depending on what folder parameter she opened
        const titles = { 
            'text': 'MESSAGES', 
            'voice': 'VOICE NOTES', 
            'doodle': 'DOODLES' 
        };
        document.getElementById('folder-title').innerText = titles[folderType] || 'INBOX';

        // Map matching display icons to give her dynamic feedback inside the custom inbox row layout
        const inboxIcons = {
            'text': '💬',
            'voice': '🎤',
            'doodle': '🎨'
        };
        const currentIcon = inboxIcons[folderType] || '❤️';

        async function loadNotes() {
            const { data, error } = await _supabase
                .from('scrapbook')
                .select('*')
                .eq('type', folderType) // Matches 'text', 'voice', or 'doodle' directly from the DB row strings
                .order('created_at', { ascending: false });

            const list = document.getElementById('inbox-list');
            list.innerHTML = ''; 

            if (error) {
                list.innerHTML = '<p style="text-align:center; padding:20px;">Error loading memories.</p>';
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = '<p style="text-align:center; padding:20px; color:#94a3b8;">No memories here yet. 💛</p>';
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'ngl-card';
                
                let previewText = item.content;
                if (item.type === 'doodle') previewText = 'Sent a doodle...';
                if (item.type === 'voice') previewText = 'Sent a voice note...';

                card.innerHTML = `
                    <div class="ngl-mail-icon">${currentIcon}</div>
                    <div class="ngl-text-content">
                        <p>${previewText.substring(0, 35)}${previewText.length > 35 ? '...' : ''}</p>
                        <span>${new Date(item.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="ngl-arrow">❯</div>
                `;
                card.onclick = () => openModal(item);
                list.appendChild(card);
            });
        }

        function openModal(item) {
            const body = document.getElementById('modal-body');
            if (item.type === 'doodle') {
                body.innerHTML = `<img src="${item.content}" style="width:100%; border-radius:10px; max-height: 65vh; object-fit: contain; display: block; margin: 0 auto;">`;
            } else if (item.type === 'voice') {
                body.innerHTML = `
                    <p style="color:#666; font-size:14px; text-align:center; margin-bottom:10px;">Voice Note</p>
                    <audio controls src="${item.content}" style="width:100%; outline:none;"></audio>
                `;
            } else {
                body.innerHTML = `<p style="color:#333; font-size:1.1rem; line-height:1.6; word-wrap: break-word;">${item.content}</p>`;
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            const audio = document.querySelector('#modal-body audio');
            if(audio) audio.pause();
        }

        loadNotes();
    </script>
</body>
</html>

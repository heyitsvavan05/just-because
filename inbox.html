<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbox</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* FIXES SQUISHED SIDES AND MESSAGES CRAMMED AT THE TOP */
        body.ngl-body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Fallback matching your theme */
        }

        /* Forces container to take full width with clean mobile breathing room on side edges */
        .ngl-container {
            width: 100% !important;
            max-width: 420px !important; /* Perfect phone width constraint */
            margin: 0 auto !important;
            padding: 10px 20px !important; /* 20px stops the squished edge-clipping completely */
            box-sizing: border-box !important;
        }

        /* Spaces cards vertically and pushes them safely down away from the top header bar */
        #inbox-list {
            display: flex !important;
            flex-direction: column !important;
            gap: 15px !important; /* Adds visual breathing room between cards */
            margin-top: 30px !important; /* Pushes cards cleanly down from the top header */
            padding-bottom: 40px !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }

        /* Ensures cards utilize the newly restored side space gracefully */
        .ngl-card {
            width: 100% !important;
            box-sizing: border-box !important;
            background: #1e293b !important;
            border-radius: 14px !important;
            padding: 16px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
        }
    </style>
</head>
<body class="ngl-body">

    <div class="ngl-container">
        <header class="ngl-header">
            <div onclick="location.href='index.html'" class="back-btn">◀</div>
            <div class="ngl-tabs"><span id="folder-title">INBOX</span></div>
            <div class="icon">⚙️</div>
        </header>

        <main id="inbox-list">
            <div class="loading-state">Loading your memories...</div>
        </main>
    </div>

    <div id="modal" class="modal hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kucwhpkcpfadsdrqvxjv.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Y3docGtjcGZhZHNkcnF2eGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjQ2NzAsImV4cCI6MjA5NDQ0MDY3MH0.PIUz00Qm_r6NkCKL8I4XQSSmvR02qt2VPwJQVY2s2qg";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. Read the parameter (?view=text, ?view=voice, or ?view=doodle)
        const urlParams = new URLSearchParams(window.location.search);
        let folderType = urlParams.get('view') || 'text'; 

        // 2. Set distinct headers so she knows exactly which room she is looking at
        const titles = { 
            'text': 'MESSAGES', 
            'voice': 'VOICE NOTES', 
            'doodle': 'DOODLES' 
        };
        document.getElementById('folder-title').innerText = titles[folderType] || 'INBOX';

        // 3. Match the internal card design aesthetics to the active mode
        const inboxIcons = { 'text': '💬', 'voice': '🎤', 'doodle': '🎨' };
        const currentIcon = inboxIcons[folderType] || '❤️';

        async function loadNotes() {
            // 4. FILTER QUERY: Only pull items where DB type column matches our folderType string
            const { data, error } = await _supabase
                .from('scrapbook')
                .select('*')
                .eq('type', folderType) 
                .order('created_at', { ascending: false });

            const list = document.getElementById('inbox-list');
            list.innerHTML = ''; 

            if (error) {
                list.innerHTML = '<p style="text-align:center; padding:20px;">Error loading memories.</p>';
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = `<p style="text-align:center; padding:40px 20px; color:#94a3b8; font-size:14px;">No ${titles[folderType].toLowerCase()} inside this folder yet. 💛</p>`;
                return;
            }

            // 5. Populate rows cleanly with correct context tags
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'ngl-card';

                let previewText = item.content;
                if (item.type === 'doodle') previewText = '🎨 Sent a unique doodle...';
                if (item.type === 'voice') previewText = '🎤 Sent a private voice note...';

                card.innerHTML = `
                    <div class="ngl-mail-icon">${currentIcon}</div>
                    <div class="ngl-text-content">
                        <p>${previewText.substring(0, 35)}${previewText.length > 35 ? '...' : ''}</p>
                        <span>${new Date(item.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="ngl-arrow">❯</div>
                `;
                card.onclick = () => openModal(item);
                list.appendChild(card);
            });
        }

        function openModal(item) {
            const body = document.getElementById('modal-body');

            // Render rules dynamically depending on row type definition
            if (item.type === 'doodle') {
                body.innerHTML = `<img src="${item.content}" style="width:100%; border-radius:10px; max-height: 65vh; object-fit: contain; display: block; margin: 0 auto;">`;
            } else if (item.type === 'voice') {
                body.innerHTML = `
                    <p style="color:#64748b; font-size:14px; text-align:center; margin-bottom:12px;">Voice Playback</p>
                    <audio controls src="${item.content}" style="width:100%; outline:none;"></audio>
                `;
            } else {
                body.innerHTML = `<p style="color:#0f172a; font-size:1.1rem; line-height:1.6; text-align:left; word-wrap: break-word; white-space: pre-wrap;">${item.content}</p>`;
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            const audio = document.querySelector('#modal-body audio');
            if(audio) audio.pause();
        }

        // Run the custom sorting function automatically on page load
        loadNotes();
    </script>
</body>
</html>
